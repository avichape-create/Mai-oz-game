<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Varela Round', sans-serif;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: 390px;
    height: 700px;
  }
  #bottom-hud {
    width: 390px;
    display: none;
    background: linear-gradient(135deg, #2d0060, #1a003a);
    border-radius: 0 0 20px 20px;
    padding: 14px 30px;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 8px 32px #00000088;
    border-top: 2px solid rgba(255,100,255,0.25);
  }
  .hud-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .hud-label {
    font-family: 'Fredoka One', cursive;
    font-size: 12px;
    color: #ccaaff;
    letter-spacing: 1px;
  }
  .hud-value {
    font-family: 'Fredoka One', cursive;
    font-size: 34px;
    line-height: 1;
  }

  canvas {
    display: block;
    width: 390px;
    height: 700px;
    border-radius: 24px;
    box-shadow: 0 0 60px #ff80ff55, 0 0 120px #8844ff33;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }

  #score {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    color: #fff;
    text-shadow: 0 0 12px #ffdd44, 0 2px 0 #c47a00;
    letter-spacing: 1px;
  }

  #lives {
    font-size: 24px;
    letter-spacing: 3px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #2d0a5e 0%, #1a0a2e 100%);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 18px;
    padding: 30px;
  }

  #overlay h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 42px;
    color: #fff;
    text-shadow: 0 0 20px #ff88ff, 0 3px 0 #8800cc;
    text-align: center;
    line-height: 1.2;
  }

  #overlay .subtitle {
    font-size: 16px;
    color: #ddb8ff;
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
  }

  #overlay .emoji-row {
    font-size: 36px;
    letter-spacing: 8px;
    margin: 6px 0;
  }

  #startBtn {
    margin-top: 10px;
    background: linear-gradient(135deg, #ff6ec7, #ff3fa0);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 24px;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    cursor: pointer;
    box-shadow: 0 6px 24px #ff3fa066, 0 2px 0 #a0005c;
    transition: transform 0.1s, box-shadow 0.1s;
    pointer-events: all;
  }
  #startBtn:active { transform: scale(0.96); box-shadow: 0 2px 12px #ff3fa066; }

  #bonus-msg {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #ffe066;
    text-shadow: 0 0 12px #ffaa00;
    pointer-events: none;
    z-index: 15;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
  }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>

  // ── Sound System (Web Audio API - retro 8-bit) ─────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playTone(type, freq, duration, vol=0.3, freqEnd=null) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  }

  function soundJump() {
    initAudio();
    playTone('square', 220, 0.12, 0.25, 440);

// ── Particles ─────────────────────────────────────────
class Particle {
  constructor(x, y, color, emoji) {
    this.x = x; this.y = y;
    this.color = color; this.emoji = emoji;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = -Math.random() * 6 - 2;
    this.life = 1; this.size = emoji ? 18 : Math.random() * 6 + 3;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.2; this.life -= 0.04;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    if (this.emoji) {
      ctx.font = `${this.size}px serif`;
      ctx.fillText(this.emoji, this.x, this.y);
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ── Mai ────────────────────────────────────────────────
class Mai {
  constructor() {
    this.x = 90; this.y = H / 2;
    this.vy = 0; this.angle = 0;
    this.alive = true; this.radius = 36;
    this.flap = 0; this.invincible = 0;
    this.doubleScore = 0; this.shield = 0;
  }
  jump() {
    if (!this.alive) return;
    this.vy = -9.5;
    this.flap = 8;
    soundJump();
    spawnParticles(this.x, this.y, '#ffccff', 4);
  }
  update() {
    this.vy += 0.42;
    this.y += this.vy;
    this.angle = Math.min(Math.PI / 3, Math.max(-Math.PI / 4, this.vy * 0.06));
    this.flap = Math.max(0, this.flap - 1);
    if (this.invincible > 0) this.invincible--;
    if (this.doubleScore > 0) this.doubleScore--;
    if (this.shield > 0) this.shield--;
    // bounds
    if (this.y - this.radius < 0) { this.y = this.radius; this.vy = 0; }
    if (this.y + this.radius > H - 70) {
      this.y = H - 70 - this.radius; this.vy = -4; loseLife();
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // glow
    if (this.invincible % 6 < 3 || this.invincible === 0) {
      if (this.doubleScore > 0) {
        ctx.shadowColor = '#ffdd44'; ctx.shadowBlur = 20;
      }
      // body circle
      ctx.beginPath();
      ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(-6, -8, 2, 0, 0, this.radius);
      grad.addColorStop(0, '#fff0f8');
      grad.addColorStop(1, '#ff88cc');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = '#ff3399';
      ctx.lineWidth = 2;
      ctx.stroke();

      // face - real Mai photo
      if (maiImg.complete && maiImg.naturalWidth > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(maiImg, -this.radius, -this.radius, this.radius*2, this.radius*2);
        ctx.restore();
      } else {
        ctx.font = '28px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u{1F467}', 0, 1);
      }
    }
    ctx.restore();

    // Shield ring + lion above head
    if (this.shield > 0) {
      ctx.save();
      ctx.translate(this.x, this.y);
      const pulse = 1 + 0.08 * Math.sin(frame * 0.15);
      ctx.beginPath();
      ctx.arc(0, 0, (this.radius + 14) * pulse, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(180, 100, 20, ${0.5 + 0.4 * Math.sin(frame * 0.2)})`;
      ctx.lineWidth = 5;
      ctx.shadowColor = '#cc6600';
      ctx.shadowBlur = 18;
      ctx.stroke();
      // inner glow
      ctx.beginPath();
      ctx.arc(0, 0, (this.radius + 6) * pulse, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 180, 60, ${0.3 + 0.3 * Math.sin(frame * 0.3)})`;
      ctx.lineWidth = 3;
      ctx.stroke();
      // Lion emoji above head
      ctx.font = '32px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 20;
      const lionBob = Math.sin(frame * 0.12) * 4;
      ctx.fillText('🦁', 0, -(this.radius + 38) + lionBob);
      ctx.restore();
    }
  }
}

// ── Pipe ──────────────────────────────────────────────
class Pipe {
  constructor() {
    this.x = W + 40;
    this.gap = Pipe.prototype._gapSize || 190;
    this.top = 80 + Math.random() * (H - 70 - this.gap - 120);
    this.bottom = this.top + this.gap;
    this.width = 64;
    this.passed = false;
    this.color = this.randColor();
  }
  randColor() {
    const cols = ['#4ecb71','#ff6b6b','#6b8cff','#ffbb33'];
    return cols[Math.floor(Math.random() * cols.length)];
  }
  update() { this.x -= Math.min(5.5, 2.8 + score * 0.002); }
  draw() {
    // top pipe
    this.drawPipe(this.x, 0, this.width, this.top, true);
    // bottom pipe
    this.drawPipe(this.x, this.bottom, this.width, H - 70 - this.bottom, false);
  }
  drawPipe(x, y, w, h, isTop) {
    const capH = 20, capW = w + 10;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.roundRect(x, isTop ? y : y + capH, w, isTop ? h - capH : h - capH, 8);
    ctx.fill();
    // darker stripe
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(x + w - 14, isTop ? y : y + capH, 10, isTop ? h - capH : h - capH);
    // cap
    ctx.fillStyle = shadeColor(this.color, -20);
    ctx.beginPath();
    ctx.roundRect(x - 5, isTop ? h - capH : y, capW, capH, 6);
    ctx.fill();
  }
  hits(mai) {
    const r = mai.radius - 4;
    if (mai.x + r > this.x && mai.x - r < this.x + this.width) {
      if (mai.y - r < this.top || mai.y + r > this.bottom) return true;
    }
    return false;
  }
}

// ── Sunflower ─────────────────────────────────────────
class Sunflower {
  constructor() {
    this.x = W + 30;
    this.radius = 18;
    this.y = safeY(this.radius);
    this.collected = false;
    this.bob = Math.random() * Math.PI * 2;
  }
  update() {
    this.x -= Math.min(5.5, 2.8 + score * 0.002);
    this.bob += 0.05;
    this.y += Math.sin(this.bob) * 0.3;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.font = '30px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // glow
    ctx.shadowColor = '#ffdd44'; ctx.shadowBlur = 14;
    ctx.fillText('🌻', 0, 0);
    ctx.restore();
  }
  hits(mai) {
    const dx = mai.x - this.x, dy = mai.y - this.y;
    return Math.sqrt(dx*dx+dy*dy) < mai.radius + this.radius;
  }
}

// ── Friend ─────────────────────────────────────────────
class Friend {
  constructor() {
    const f = OZ_FRIENDS[Math.floor(Math.random() * OZ_FRIENDS.length)];
    this.emoji = f.emoji; this.name = f.name; this.bonusText = f.bonus; this.evil = f.evil || false;
    this.x = W + 30;
    this.radius = this.evil ? 52 : 36;
    this.y = safeY(this.radius);
    this.bob = Math.random() * Math.PI * 2;
  }
  update() {
    this.x -= Math.min(5.2, 2.5 + score * 0.002);
    this.bob += 0.04;
    this.y += Math.sin(this.bob) * 0.4;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    const fontSize = this.evil ? 54 : 38;
    ctx.font = fontSize + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = this.evil ? '#ff2200' : '#aaffcc';
    ctx.shadowBlur = this.evil ? 28 : 16;
    ctx.fillText(this.emoji, 0, 0);
    ctx.restore();
  }
  hits(mai) {
    const dx = mai.x - this.x, dy = mai.y - this.y;
    return Math.sqrt(dx*dx+dy*dy) < mai.radius + this.radius;
  }
}

// ── helpers ────────────────────────────────────────────
function shadeColor(col, amt) {
  let r = parseInt(col.slice(1,3),16)+amt;
  let g = parseInt(col.slice(3,5),16)+amt;
  let b = parseInt(col.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function spawnParticles(x, y, color, n, emoji) {
  for (let i = 0; i < n; i++) particles.push(new Particle(x, y, color, emoji));
}

function showBonus(text, y) {
  const el = document.getElementById('bonus-msg');
  el.textContent = text;
  el.style.top = Math.max(60, y - 40) + 'px';
  el.style.opacity = '1';
  clearTimeout(bonusTimeout);
  bonusTimeout = setTimeout(() => { el.style.opacity = '0'; }, 1200);
}

function updateUI() {
  document.getElementById('score').textContent = '🌻 ' + score;
  document.getElementById('big-score').textContent = score;
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const timeStr = mins + ':' + String(secs).padStart(2,'0');
  document.getElementById('lives').textContent = '⏱️ ' + timeStr;
  const bigTimer = document.getElementById('big-timer-text');
  if (bigTimer) {
    bigTimer.textContent = timeStr;
    const pct = timeLeft / 90;
    const size = Math.max(22, Math.round(34 * pct));
    bigTimer.style.fontSize = size + 'px';
    bigTimer.style.color = timeLeft <= 15 ? (timeLeft % 2 === 0 ? '#ff4444' : '#fff') : '#fff';
    bigTimer.style.textShadow = timeLeft <= 15 ? '0 0 16px #ff0000' : '0 0 12px #8888ff';
  }
  // Win at 250!
  if (score >= winTarget && state === 'playing') {
    mai.alive = false;
    state = 'dead';
    soundWin();
    setTimeout(() => showWinScreen(), 400);
  }
}

function flashPortraitPoints(text) {
  const el = document.getElementById('portrait-points');
  el.textContent = text;
  el.style.opacity = '1';
  clearTimeout(window._ppTimeout);
  window._ppTimeout = setTimeout(() => { el.style.opacity = '0'; }, 900);
}

function loseLife() {
  if (mai.invincible > 0) return;
  soundHit();
  spawnParticles(mai.x, mai.y, '#ff4444', 8);
  score = Math.max(0, score - 5);
  updateUI();
  showBonus('-5 💥', mai.y);
  // Respawn Mai at center with invincibility — no game over from hits
  mai.y = H / 2;
  mai.vy = 0;
  mai.invincible = 120;
}

// ── Background ─────────────────────────────────────────
function drawBg() {
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H - 70);
  sky.addColorStop(0, '#1a0050');
  sky.addColorStop(0.5, '#3d0080');
  sky.addColorStop(1, '#6600aa');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H - 70);

  // stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137 + bgOffset * 0.3) % W);
    const sy = (i * 71) % (H - 80);
    const r = (i % 3 === 0) ? 1.5 : 0.8;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
  }

  // rainbow road (decorative)
  const rainbowY = H - 140;
  const rainbowColors = ['#ff0044','#ff6600','#ffdd00','#44dd00','#0099ff','#8833ff'];
  rainbowColors.forEach((c, i) => {
    ctx.strokeStyle = c;
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.18;
    ctx.beginPath();
    ctx.arc(W/2, rainbowY + 300, 280 + i*14, Math.PI, 0);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // ground
  const grd = ctx.createLinearGradient(0, H-70, 0, H);
  grd.addColorStop(0, '#3a7d00');
  grd.addColorStop(1, '#1e4400');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H-70, W, 70);

  // ground flowers
  for (let i = 0; i < 12; i++) {
    const fx = ((i * 35 + groundOffset) % (W + 30)) - 15;
    ctx.font = '20px serif';
    ctx.fillText('🌸', fx, H - 48);
  }
  // yellow brick road
  ctx.fillStyle = '#b8860b';
  ctx.globalAlpha = 0.4;
  for (let i = 0; i < 10; i++) {
    const bx = ((i * 42 + groundOffset * 0.8) % (W + 42)) - 21;
    ctx.fillRect(bx, H - 30, 34, 18);
  }
  ctx.globalAlpha = 1;
}

// ── Init / Start ───────────────────────────────────────
function setDifficulty(level, btn) {
  difficulty = level;
  winTarget = level === 'easy' ? 100 : level === 'medium' ? 200 : 300;
  // Update button styles
  ['easy','medium','hard'].forEach(d => {
    const b = document.getElementById('btn-' + d);
    if (!b) return;
    b.style.boxShadow = '';
    b.style.transform = '';
  });
  btn.style.boxShadow = '0 0 16px ' + (level==='easy'?'#44ff44':level==='medium'?'#ffdd44':'#ff4400');
  btn.style.transform = 'scale(1.08)';
}

function safeY(radius) {
  // Try up to 10 random Y positions; pick one not inside any pipe
  for (let attempt = 0; attempt < 10; attempt++) {
    const y = (radius + 10) + Math.random() * (H - 70 - radius * 2 - 20);
    let safe = true;
    for (const p of pipes) {
      const inCol = (90 + radius) > p.x && (90 - radius) < p.x + p.width;
      if (inCol && (y - radius < p.top || y + radius > p.bottom)) {
        safe = false; break;
      }
    }
    if (safe) return y;
  }
  // Fallback: center of screen
  return H / 2;
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  // mai-portrait removed
  document.getElementById('bottom-hud').style.display = 'flex';
  document.getElementById('game-title').style.display = 'block';
  score = 0; lives = 10; frame = 0; timeLeft = 90; lastTime = null; accumulator = 0;
  // Apply difficulty settings
  if (difficulty === 'easy') {
    Pipe.prototype._gapSize = 230;
  } else if (difficulty === 'hard') {
    Pipe.prototype._gapSize = 150;
  } else {
    Pipe.prototype._gapSize = 190;
  }
  mai = new Mai();
  pipes = []; sunflowers = []; friends = []; particles = [];
  bgOffset = 0; groundOffset = 0;
  state = 'playing';
  updateUI();
  requestAnimationFrame(loop);
}

// ── Game Loop ──────────────────────────────────────────
let lastTime = null;
let accumulator = 0;
const STEP = 1000 / 60; // fixed 60fps step in ms

function loop(timestamp) {
  if (state !== 'playing') return;
  if (!lastTime) lastTime = timestamp;
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  // Cap delta to avoid spiral of death after tab switch
  if (delta > 100) delta = 100;
  accumulator += delta;

  // Only step when enough time has accumulated
  while (accumulator >= STEP) {
    accumulator -= STEP;
    frame++;
    bgOffset += 1;
    groundOffset += 2.5;

    // Timer countdown (real 60fps steps)
    if (frame % 60 === 0 && timeLeft > 0) {
      timeLeft--;
      updateUI();
      if (timeLeft <= 0) {
        mai.alive = false;
        soundGameOver();
        setTimeout(() => showDeadScreen(), 400);
        return;
      }
      if (timeLeft <= 15) {
        document.getElementById('lives').style.color = timeLeft % 2 === 0 ? '#ff4444' : '#fff';
      }
    }

  ctx.clearRect(0, 0, W, H);
  drawBg();

  // spawn pipes
  if (frame % 90 === 0) pipes.push(new Pipe());
  // spawn sunflowers
  if (frame % 60 === 0) sunflowers.push(new Sunflower());
  // spawn friends
  if (frame % 180 === 0) friends.push(new Friend());
  // extra lion every ~6 seconds
  if (frame % 360 === 90) {
    const lion = OZ_FRIENDS.find(f => f.shield);
    const l = new Friend();
    l.emoji = lion.emoji; l.name = lion.name; l.bonusText = lion.bonus; l.shield = true; l.evil = false;
    l.radius = 36;
    friends.push(l);
  }
  // extra witch every ~8 seconds
  if (frame % 480 === 240) {
    const witch = OZ_FRIENDS.find(f => f.evil);
    const w = new Friend();
    w.emoji = witch.emoji; w.name = witch.name; w.bonusText = witch.bonus; w.evil = true;
    w.radius = 52;
    friends.push(w);
  }

  // update & draw pipes
  pipes = pipes.filter(p => p.x > -100);
  pipes.forEach(p => {
    p.update(); p.draw();
    if (!p.passed && p.x + p.width < mai.x) {
      p.passed = true; score++; updateUI();
      soundPoint();
      spawnParticles(mai.x, mai.y, '#aaffcc', 3);
    }
    // Solid wall — block Mai from entering pipes
    if (mai.alive) {
      const r = mai.radius - 2;
      if (mai.x + r > p.x && mai.x - r < p.x + p.width) {
        if (mai.y - r < p.top) {
          // Hitting bottom face of top pipe — stop upward movement
          mai.y = p.top + r + 1;
          if (mai.vy < 0) mai.vy = 0;
          if (mai.invincible === 0) { soundHit(); spawnParticles(mai.x, mai.y, '#ff8844', 3); mai.invincible = 20; }
        } else if (mai.y + r > p.bottom) {
          // Hitting top face of bottom pipe — stop, then gravity takes over naturally
          mai.y = p.bottom - r - 1;
          if (mai.vy > 0) mai.vy = 0;
          if (mai.invincible === 0) { soundHit(); spawnParticles(mai.x, mai.y, '#ff8844', 3); mai.invincible = 20; }
        }
      }
    }
  });

  // update & draw sunflowers
  sunflowers = sunflowers.filter(s => s.x > -40 && !s.collected);
  sunflowers.forEach(s => {
    s.update(); s.draw();
    if (mai.alive && s.hits(mai)) {
      s.collected = true;
      const pts = mai.doubleScore > 0 ? 2 : 1;
      score += pts; updateUI();
      soundSunflower();
      flashPortraitPoints(`+${pts} 🌻`);
      spawnParticles(s.x, s.y, '#ffdd44', 6, '✨');
      showBonus(`+${pts} 🌻`, s.y);
    }
  });

  // update & draw friends
  friends = friends.filter(f => f.x > -50);
  friends.forEach((f, idx) => {
    f.update(); f.draw();
    if (mai.alive && f.hits(mai)) {
      if (f.evil) {
        if (mai.shield > 0) {
          // Shield blocks the witch!
          soundFriend();
          spawnParticles(f.x, f.y, '#cc6600', 12, '🛡️');
          showBonus('🦁 המגן הציל! 🛡️', f.y);
          flashPortraitPoints('🛡️ מוגנת!');
          mai.invincible = 60; // prevent re-trigger
        } else {
          score = Math.max(0, score - 25);
          updateUI();
          soundHit();
          flashPortraitPoints('-25 🧙‍♀️');
          spawnParticles(f.x, f.y, '#ff4400', 10, '💀');
          showBonus('🧙‍♀️ קסם שחור! -25', f.y);
          mai.invincible = 60;
        }
      } else if (f.shield) {
        mai.shield = 600; // 10 seconds at 60fps
        soundFriend();
        flashPortraitPoints('🦁 מגן!');
        spawnParticles(f.x, f.y, '#cc6600', 10, '🛡️');
        showBonus('🦁 מגן אומץ! 10 שניות', f.y);
      } else {
        if (f.bonusText.includes('30')) { score += 30; }
        else if (f.bonusText.includes('25')) { score += 25; }
        else if (f.bonusText.includes('20')) { score += 20; }
        else { score += 15; }
        updateUI();
        soundFriend();
        flashPortraitPoints(f.bonusText);
        spawnParticles(f.x, f.y, '#aaffcc', 8, f.emoji);
        showBonus(`${f.emoji} ${f.bonusText}`, f.y);
      }
      friends.splice(idx, 1);
    }
  });

  // particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });

  // mai
  mai.update(); mai.draw();

  // double score indicator
  if (mai.doubleScore > 0) {
    ctx.save();
    ctx.font = "bold 14px 'Varela Round'";
    ctx.fillStyle = '#ffe066';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 8;
    ctx.fillText('✨ ×2 נקודות!', mai.x, mai.y - 38);
    ctx.restore();
  }

  } // end while
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────
function handleInput() {
  if (state === 'playing' && mai) mai.jump();
}
document.addEventListener('keydown', e => { if (e.code === 'Space') handleInput(); });
canvas.addEventListener('click', handleInput);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); });

// ── Start overlay button ───────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);
</script>

<script>
if ('serviceWorker' in navigator) {
  const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
